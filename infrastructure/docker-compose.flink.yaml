services:
  jobmanager:
    image: flink:1.20.2-java17
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    networks:
      - data-tier
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
      - KAFKA_FLINK_USERNAME=${KAFKA_FLINK_USERNAME}
      - KAFKA_FLINK_PASSWORD=${KAFKA_FLINK_PASSWORD}
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      # flink 1.20.x uses deep reflection into java.base internals — without these add-opens the job
      # fails at startup with InaccessibleObjectException on Collections$UnmodifiableMap
      - >-
        FLINK_ENV_JAVA_OPTS=
        --add-opens java.base/java.util=ALL-UNNAMED
        --add-opens java.base/java.lang=ALL-UNNAMED
        --add-opens java.base/java.lang.reflect=ALL-UNNAMED
        --add-opens java.base/java.io=ALL-UNNAMED
        --add-opens java.base/java.net=ALL-UNNAMED
        --add-opens java.base/java.nio=ALL-UNNAMED
        --add-opens java.base/sun.nio.ch=ALL-UNNAMED
        --add-opens java.base/java.util.concurrent=ALL-UNNAMED
        --add-opens java.base/java.util.concurrent.atomic=ALL-UNNAMED
        --add-exports java.base/sun.net.util=ALL-UNNAMED
    volumes:
      - ../output:/opt/flink/output
      - ../pageview-stream-processor/target:/opt/flink/jobs
    depends_on:
      kafka:
        condition: service_healthy

  taskmanager:
    image: flink:1.20.2-java17
    container_name: flink-taskmanager
    command: taskmanager
    networks:
      - data-tier
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
      # taskmanager also needs these — it instantiates operators via reflection on its own jvm
      - >-
        FLINK_ENV_JAVA_OPTS=
        --add-opens java.base/java.util=ALL-UNNAMED
        --add-opens java.base/java.lang=ALL-UNNAMED
        --add-opens java.base/java.lang.reflect=ALL-UNNAMED
        --add-opens java.base/java.io=ALL-UNNAMED
        --add-opens java.base/java.net=ALL-UNNAMED
        --add-opens java.base/java.nio=ALL-UNNAMED
        --add-opens java.base/sun.nio.ch=ALL-UNNAMED
        --add-opens java.base/java.util.concurrent=ALL-UNNAMED
        --add-opens java.base/java.util.concurrent.atomic=ALL-UNNAMED
        --add-exports java.base/sun.net.util=ALL-UNNAMED
    volumes:
      - ../output:/opt/flink/output
    depends_on:
      - jobmanager
