services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker
    networks:
      - data-tier
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-broker:9093

      - KAFKA_LISTENERS=INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka-broker:29092,EXTERNAL://localhost:9092

      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,INTERNAL:SASL_PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL

      - KAFKA_KRAFT_MODE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk

      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      # fixes rmi stub hostname and pins rmi data port to match the registry port,
      # so the jmx exporter sidecar can connect on a single port.
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/jaas.conf -Djava.rmi.server.hostname=kafka-broker -Dcom.sun.management.jmxremote.rmi.port=9101
      - KAFKA_JMX_PORT=9101
      - KAFKA_JMX_HOSTNAME=kafka-broker

      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - ./kafka/jaas.conf:/etc/kafka/jaas.conf
    healthcheck:
      test: [ "CMD-SHELL", "echo 'security.protocol=SASL_PLAINTEXT' > /tmp/client.properties && echo 'sasl.mechanism=PLAIN' >> /tmp/client.properties && echo 'sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${KAFKA_ADMIN_USERNAME}\" password=\"${KAFKA_ADMIN_PASSWORD}\";' >> /tmp/client.properties && kafka-broker-api-versions --bootstrap-server localhost:29092 --command-config /tmp/client.properties" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    networks:
      - data-tier
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

      # the registry stores schemas in the _schemas topic — needs admin-level kafka access
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-broker:29092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_ADMIN_USERNAME}"
        password="${KAFKA_ADMIN_PASSWORD}";

      # new schema versions must be backward-compatible with the previous version
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "7070:8080"
    networks:
      - data-tier
    environment:
      - KAFKA_CLUSTERS_0_NAME=Local-KRaft-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-broker:29092
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081

      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=SASL_PLAINTEXT
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM=PLAIN
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_ADMIN_USERNAME}" password="${KAFKA_ADMIN_PASSWORD}";
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
