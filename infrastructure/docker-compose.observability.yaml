services:
  # downloads jmx_prometheus_httpserver 0.20.0 at startup; pinned to 0.20.0 because
  # the 1.x rewrite changed config format and broke hostPort support.
  kafka-jmx-exporter:
    image: eclipse-temurin:17-jre
    container_name: kafka-jmx-exporter
    ports:
      - "7071:5556"
    volumes:
      - ../infrastructure/kafka/jmx-exporter-config.yaml:/etc/jmx-exporter/config.yaml:ro
    networks:
      - data-tier
    entrypoint: ["sh", "-c", "curl -fsSL https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_httpserver/0.20.0/jmx_prometheus_httpserver-0.20.0.jar -o /tmp/jmx_exporter.jar && java -jar /tmp/jmx_exporter.jar 5556 /etc/jmx-exporter/config.yaml"]
    depends_on:
      kafka:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - data-tier

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - data-tier
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus